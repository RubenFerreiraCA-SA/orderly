<div class="shell" [class.sidebar-open]="sidebarOpen()">

  <app-sidebar [open]="sidebarOpen()" (navigate)="closeSidebar()" />

  <div class="main-area">
    <app-topbar (menuToggle)="toggleSidebar()" />

      <router-outlet />
    </main>
  </div>
</div>
